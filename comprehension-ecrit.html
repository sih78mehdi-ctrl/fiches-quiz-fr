<title>📖 Compréhension de l'écrit - 2AS</title>
<style>
  :root{
    --bg:#eef4fb;
    --ink:#1c2b3a;
    --card:#ffffff;
    --accent1:#2e86de; /* bleu */
    --accent2:#27ae60; /* vert */
    --accent3:#f39c12; /* orange */
    --accent4:#e84393; /* rose */
    --accent5:#9b59b6; /* violet */
    --accent6:#16a596; /* teal */
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Segoe UI', Verdana, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: 60px;
  }
  header{
    background: linear-gradient(120deg,#2e86de,#16a596);
    color:white;
    padding: 34px 20px 46px;
    text-align:center;
    border-bottom-left-radius: 40px;
    border-bottom-right-radius: 40px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
  }
  header h1{
    margin:0;
    font-size: 2rem;
    letter-spacing: .5px;
  }
  header p{
    margin: 10px auto 0;
    max-width: 640px;
    font-size: .98rem;
    opacity: .95;
    line-height:1.5;
  }
  .wrap{
    max-width: 1100px;
    margin: -26px auto 0;
    padding: 0 18px;
  }
  #gridView .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap: 18px;
    margin-top: 30px;
  }
  .fiche-card{
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align:center;
    cursor:pointer;
    box-shadow: 0 4px 14px rgba(20,40,80,0.10);
    border: 3px solid transparent;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .fiche-card:hover{
    transform: translateY(-4px);
    box-shadow: 0 10px 22px rgba(20,40,80,0.18);
  }
  .fiche-card .icon{
    font-size: 2.4rem;
    display:block;
    margin-bottom: 10px;
  }
  .fiche-card h3{
    margin: 0 0 6px;
    font-size: 1.02rem;
    line-height:1.3;
  }
  .fiche-card .tag{
    display:inline-block;
    font-size: .72rem;
    font-weight:600;
    padding: 3px 10px;
    border-radius: 20px;
    color:white;
  }
  .section-label{
    text-align:center;
    font-size: .95rem;
    color:#4a5568;
    margin-top: 8px;
  }

  /* Reading view */
  #readerView{ display:none; }
  .back-btn{
    background:white;
    border: 2px solid #2e86de;
    color:#2e86de;
    font-weight:700;
    padding: 8px 18px;
    border-radius: 30px;
    cursor:pointer;
    margin: 22px 0 10px;
    font-size:.9rem;
  }
  .back-btn:hover{ background:#2e86de; color:white; }

  .text-card{
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px 26px;
    box-shadow: 0 4px 14px rgba(20,40,80,0.10);
    margin-bottom: 22px;
  }
  .text-card h2{
    margin-top:0;
    font-size: 1.4rem;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .meta-row{
    font-size:.8rem;
    color:#5a6b7d;
    margin-bottom: 14px;
    font-style: italic;
  }
  .text-card p{
    line-height: 1.7;
    font-size: 1rem;
    margin: 0 0 14px;
    text-align: justify;
  }
  .source-line{
    text-align:right;
    font-size:.82rem;
    color:#7a8a99;
    font-style:italic;
    margin-top: 6px;
  }

  .quiz-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .quiz-header h3{
    margin:0;
    font-size: 1.15rem;
  }
  .quiz-actions button{
    background: var(--accent1);
    color:white;
    border:none;
    padding: 8px 16px;
    border-radius: 24px;
    font-size:.82rem;
    font-weight:600;
    cursor:pointer;
    margin-left: 8px;
  }
  .quiz-actions button.secondary{
    background:white;
    color: var(--accent1);
    border: 2px solid var(--accent1);
  }

  .question-block{
    background: #fbfdff;
    border-left: 5px solid var(--accent1);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .question-block .qnum{
    font-weight: 800;
    color: var(--accent1);
    margin-right: 6px;
  }
  .question-block textarea{
    width:100%;
    margin-top: 10px;
    border-radius: 10px;
    border: 1.5px solid #d7e2ee;
    padding: 10px 12px;
    font-family: inherit;
    font-size: .95rem;
    resize: vertical;
    min-height: 54px;
  }
  .question-block textarea:focus{
    outline: none;
    border-color: var(--accent1);
  }

  @media print{
    header, .back-btn, .quiz-actions, #gridView{ display:none !important; }
    body{ background:white; }
    .text-card, .question-block{ box-shadow:none; border:1px solid #ccc; }
  }

  footer{
    text-align:center;
    color:#7a8a99;
    font-size:.8rem;
    margin-top: 40px;
  }
</style>
</head>

const grid = document.getElementById('cardsGrid');
data.forEach((item, idx)=>{
  const card = document.createElement('div');
  card.className = 'fiche-card';
  card.style.borderColor = 'transparent';
  card.onmouseenter = ()=> card.style.borderColor = colors[idx % colors.length];
  card.onmouseleave = ()=> card.style.borderColor = 'transparent';
  card.onclick = ()=> openText(idx);
  card.innerHTML = `
    <span class="icon">${item.icon}</span>
    <h3>${item.title}</h3>
    <span class="tag" style="background:${colors[idx % colors.length]}">10 questions</span>
  `;
  grid.appendChild(card);
});

function openText(idx){
  const item = data[idx];
  const c = colors[idx % colors.length];
  let paragraphsHtml = item.text.map(p=>`<p>${p}</p>`).join('');
  let sourceHtml = item.source ? `<div class="source-line">${item.source}</div>` : '';

  let questionsHtml = item.questions.map((q,i)=>`
    <div class="question-block" style="border-left-color:${c}">
      <span class="qnum" style="color:${c}">${i+1}.</span>${q}
      <textarea placeholder="Écrivez votre réponse ici..."></textarea>
    </div>
  `).join('');

  document.getElementById('readerContent').innerHTML = `
    <div class="text-card">
      <h2><span>${item.icon}</span> ${item.title}</h2>
      ${paragraphsHtml}
      ${sourceHtml}
    </div>
    <div class="text-card">
      <div class="quiz-header">
        <h3>📝 Questions de compréhension</h3>
        <div class="quiz-actions">
          <button class="secondary" onclick="clearAnswers()">Effacer mes réponses</button>
          <button onclick="window.print()">Imprimer</button>
        </div>
      </div>
      ${questionsHtml}
    </div>
  `;

  document.getElementById('gridView').style.display = 'none';
  document.getElementById('readerView').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}

function clearAnswers(){
  document.querySelectorAll('#readerContent textarea').forEach(t=> t.value = '');
}

function showGrid(){
  document.getElementById('readerView').style.display = 'none';
  document.getElementById('gridView').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
